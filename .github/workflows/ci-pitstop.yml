name: pitstop CI

on:
  push:
    branches: [master]
    paths:
      - "pocs/pitstop/**"
      - ".github/workflows/ci-pitstop.yml"
  pull_request:
    paths:
      - "pocs/pitstop/**"
      - ".github/workflows/ci-pitstop.yml"

defaults:
  run:
    working-directory: pocs/pitstop

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x, 24.x]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: pocs/pitstop/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm audit --audit-level=high
