<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Pitstop — car maintenance tracker</title>
    <meta name="description" content="One dashboard for oil, tires, and brakes: mileage-based due-soon alerts, GPS trip logging, and nearby repair shops." />
    <meta name="theme-color" content="#0f1216" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icons/icon-192.png" />
    <link rel="apple-touch-icon" href="./icons/icon-192.png" />
    <link rel="stylesheet" href="./css/app.css" />
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="odo-readout">
          <div>
            <span class="odo-label">Odometer</span>
            <span id="odo-value" class="odo-value">— mi</span>
          </div>
          <button id="log-reading-btn" class="btn-small">Log reading</button>
        </div>
      </header>

      <main id="main">
        <section class="tab-panel" data-tab="dashboard"></section>
        <section class="tab-panel" data-tab="trip" hidden></section>
        <section class="tab-panel" data-tab="shops" hidden></section>
        <section class="tab-panel" data-tab="settings" hidden></section>
      </main>

      <nav class="tabbar">
        <button class="tab-btn active" data-tab="dashboard" aria-label="Dashboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21a9 9 0 1 1 9-9" /><path d="M12 12l5-3" /><path d="M19.5 16.5L21 21" /></svg>
          Dashboard
        </button>
        <button class="tab-btn" data-tab="trip" aria-label="Trip">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 19 21 12 17 5 21 12 2" /></svg>
          Trip
        </button>
        <button class="tab-btn" data-tab="shops" aria-label="Shops">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" /><circle cx="12" cy="10" r="3" /></svg>
          Shops
        </button>
        <button class="tab-btn" data-tab="settings" aria-label="Settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="21" x2="4" y2="14" /><line x1="4" y1="10" x2="4" y2="3" /><line x1="12" y1="21" x2="12" y2="12" /><line x1="12" y1="8" x2="12" y2="3" /><line x1="20" y1="21" x2="20" y2="16" /><line x1="20" y1="12" x2="20" y2="3" /><line x1="1" y1="14" x2="7" y2="14" /><line x1="9" y1="8" x2="15" y2="8" /><line x1="17" y1="16" x2="23" y2="16" /></svg>
          Settings
        </button>
      </nav>

      <dialog id="modal"></dialog>
    </div>

    <script type="module" src="./js/ui/app.js"></script>
  </body>
</html>
