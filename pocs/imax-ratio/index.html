<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Watch it in IMAX</title>
<style>
  :root {
    --bg: #08090c;
    --ink: #f0f2f8;
    --dim: #9aa0b2;
    --accent: #35a7ff;
    --gold: #f0b64a;
    --chip: #14161d;
    --chip-edge: #2a2f3c;
  }
  * { box-sizing: border-box; margin: 0; }
  html, body { height: 100%; }
  body {
    background: radial-gradient(130% 90% at 50% 0%, #0e1017 0%, var(--bg) 62%);
    color: var(--ink);
    font: 16px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    height: 100dvh;
  }

  header {
    text-align: center;
    padding: 0.7rem 1rem 0.2rem;
  }
  header h1 {
    font-size: 1.15rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    font-weight: 800;
  }
  header h1 span { color: var(--accent); }
  header p { color: var(--dim); font-size: 0.9rem; margin-top: 0.1rem; }

  /* ---------- the screen ---------- */
  #stage {
    flex: 1;
    min-height: 0;
    display: grid;
    place-items: center;
    padding: 0.6rem 1.2rem;
    position: relative;
  }
  #frame {
    position: relative;
    overflow: hidden;
    background: #000;
    border-radius: 6px;
    box-shadow:
      0 0 0 1px #20242e,
      0 0 70px rgba(53, 167, 255, 0.12),
      0 34px 90px rgba(0, 0, 0, 0.7);
    transition: width 0.7s cubic-bezier(0.22, 1, 0.3, 1),
                height 0.7s cubic-bezier(0.22, 1, 0.3, 1);
  }
  #frame > canvas, #frame > img, #frame > video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  #frame > iframe {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    border: 0;
    pointer-events: none;
    transition: width 0.7s cubic-bezier(0.22, 1, 0.3, 1),
                height 0.7s cubic-bezier(0.22, 1, 0.3, 1);
  }

  #flash {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.45s;
    text-align: center;
    padding: 1rem;
    text-shadow: 0 2px 20px rgba(0, 0, 0, 0.95);
  }
  #flash.show { opacity: 1; }
  #flash strong { font-size: clamp(1.8rem, 5vw, 3.4rem); letter-spacing: 0.05em; display: block; font-weight: 800; }
  #flash small { color: #dfe5f2; font-size: clamp(0.8rem, 1.8vw, 1.05rem); }

  /* ---------- controls ---------- */
  #controls {
    padding: 0.4rem 1rem 0.9rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
  }
  .row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.45rem;
    flex-wrap: wrap;
    width: 100%;
    max-width: 900px;
  }

  button.btn {
    background: var(--chip);
    color: var(--ink);
    border: 1px solid var(--chip-edge);
    border-radius: 999px;
    padding: 0.42rem 1rem;
    font: inherit;
    font-size: 0.9rem;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
    white-space: nowrap;
  }
  button.btn:hover { border-color: var(--accent); }
  button.btn:active { transform: scale(0.97); }
  button.btn.on {
    background: color-mix(in srgb, var(--accent) 22%, var(--chip));
    border-color: var(--accent);
  }
  button.btn.film { font-size: 0.85rem; padding: 0.36rem 0.85rem; }
  button.btn.film.on { background: color-mix(in srgb, var(--gold) 20%, var(--chip)); border-color: var(--gold); }
  button.btn b { font-weight: 700; }

  /* the hero button */
  button.hero {
    background: linear-gradient(180deg, #3fb0ff 0%, #2b8fe6 100%);
    color: #04121f;
    border: none;
    border-radius: 999px;
    padding: 0.55rem 1.5rem;
    font: inherit;
    font-weight: 800;
    font-size: 1rem;
    cursor: pointer;
    box-shadow: 0 6px 22px rgba(53, 167, 255, 0.35);
    transition: transform 0.1s, box-shadow 0.15s;
  }
  button.hero:hover { box-shadow: 0 8px 30px rgba(53, 167, 255, 0.5); }
  button.hero:active { transform: scale(0.97); }

  #ytUrl {
    background: var(--chip);
    color: var(--ink);
    border: 1px solid var(--chip-edge);
    border-radius: 999px;
    padding: 0.45rem 1.1rem;
    font: inherit;
    font-size: 0.9rem;
    flex: 1;
    min-width: 12rem;
    max-width: 32rem;
  }
  #ytUrl:focus { outline: none; border-color: var(--accent); }
  #ytUrl::placeholder { color: var(--dim); }

  .label { color: var(--dim); font-size: 0.78rem; letter-spacing: 0.05em; }
  #caption { color: var(--dim); font-size: 0.85rem; text-align: center; min-height: 1.2em; }
  #caption b { color: var(--gold); }
  .textlink {
    background: none; border: none; color: var(--dim); cursor: pointer;
    font: inherit; font-size: 0.82rem; text-decoration: underline; padding: 0.2rem;
  }
  .textlink:hover { color: var(--ink); }
  input[type="file"] { display: none; }

  @media (max-width: 640px) {
    #stage { padding: 0.4rem 0.6rem; }
    button.btn { padding: 0.4rem 0.8rem; font-size: 0.85rem; }
  }
</style>
</head>
<body>
  <header>
    <h1>Watch it in <span>IMAX</span></h1>
    <p>Paste a movie trailer and see it fill the screen, the way IMAX does</p>
  </header>

  <div id="stage">
    <div id="frame">
      <canvas id="scene"></canvas>
      <div id="flash"></div>
    </div>
  </div>

  <div id="controls">
    <div class="row">
      <input id="ytUrl" type="url" placeholder="Paste a YouTube trailer link here…" />
      <button class="btn" id="ytBtn">Play</button>
      <button class="textlink" id="mediaBtn">or use your own video</button>
      <input type="file" id="mediaInput" accept="image/*,video/*" />
    </div>

    <div class="row">
      <button class="hero" id="imaxBtn">Watch it in IMAX</button>
      <button class="btn" id="fsBtn">Full screen</button>
      <button class="btn" id="soundBtn">Sound off</button>
      <button class="btn" id="trimBtn">Trim black bars</button>
    </div>

    <div class="row" id="sizeRow">
      <span class="label">Screen size</span>
    </div>

    <div class="row" id="filmRow">
      <span class="label">Famous IMAX films</span>
    </div>

    <div id="caption"></div>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
